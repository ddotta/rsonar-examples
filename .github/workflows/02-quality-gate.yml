# ============================================================
# Workflow 2 — Quality Gate
# Blocks the pipeline if quality thresholds are not met.
# ============================================================
name: "Example: Quality Gate"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            libxml2-dev libcurl4-openssl-dev libssl-dev libgit2-dev

      - name: Install R dependencies
        run: |
          Rscript -e "
          install.packages(c('remotes','lintr','styler','covr','goodpractice',
                             'cli','jsonlite','glue','fs','rlang','withr',
                             'testthat'),
                           repos = 'https://cloud.r-project.org')
          remotes::install_github('ddotta/rsonar')
          "

      # ---- Step-by-step checks ----
      - name: Lint check
        run: |
          Rscript -e "
          library(rsonar)
          res <- sonar_analyse('.', include_coverage = FALSE,
                                    include_goodpractice = FALSE)
          export_junit(res, 'junit-lint.xml')
          cat('Lint issues:', res\$metrics\$n_lint_issues, '\n')
          "

      - name: Publish lint results
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: junit-lint.xml
          check_name: "rsonar Lint"

      - name: Quality Gate (lenient)
        run: |
          Rscript -e "
          library(rsonar)
          res <- sonar_analyse('.')
          quality_gate(res,
            coverage_min     = 30,
            lint_errors_max  = 50,
            style_issues_max = 10,
            rating_min       = 'D',
            fail_on_error    = TRUE)
          "
