# ============================================================
# Workflow 4 — Multi-format Exports
# Generate all available export formats in one job.
# ============================================================
name: "Example: All Export Formats"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  security-events: write

jobs:
  exports:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            libxml2-dev libcurl4-openssl-dev libssl-dev libgit2-dev

      - name: Install R dependencies
        run: |
          Rscript -e "
          install.packages(c('remotes','lintr','styler','covr','goodpractice',
                             'cli','jsonlite','glue','fs','rlang','withr',
                             'testthat'),
                           repos = 'https://cloud.r-project.org')
          remotes::install_github('ddotta/rsonar')
          "

      - name: Run analysis and export all formats
        run: |
          Rscript -e "
          library(rsonar)
          res <- sonar_analyse('.')
          
          # HTML dashboard
          sonar_report(res, output = 'rsonar-report.html', open = FALSE)
          
          # SonarQube Generic Issue JSON
          export_sonar_json(res, 'sonar-issues.json')
          
          # JUnit XML
          export_junit(res, 'junit-lint.xml')
          
          # SARIF 2.1.0
          export_sarif(res, 'rsonar-lint.sarif')
          
          cat('All formats exported successfully.\n')
          "

      - name: Publish JUnit results
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: junit-lint.xml
          check_name: "rsonar Lint (JUnit)"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: rsonar-lint.sarif
          category: rsonar

      - name: Upload all artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rsonar-exports
          path: |
            rsonar-report.html
            sonar-issues.json
            junit-lint.xml
            rsonar-lint.sarif
          retention-days: 14
