# ============================================================
# Workflow 5 — Trend Tracking
# Persist quality metrics over time and compare with baseline.
# ============================================================
name: "Example: Trend Tracking"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trend:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            libxml2-dev libcurl4-openssl-dev libssl-dev libgit2-dev

      - name: Install R dependencies
        run: |
          Rscript -e "
          install.packages(c('remotes','lintr','styler','covr','goodpractice',
                             'cli','jsonlite','glue','fs','rlang','withr',
                             'testthat'),
                           repos = 'https://cloud.r-project.org')
          remotes::install_github('ddotta/rsonar')
          "

      - name: Run analysis and record trend
        run: |
          Rscript -e "
          library(rsonar)
          res <- sonar_analyse('.')
          
          # Append metrics to history
          sonar_trend(res, file = 'rsonar-history.json')
          
          # Show current status
          print(res)
          cat('\nHistory file updated.\n')
          "

      - name: Commit trend history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rsonar-history.json
          git diff --cached --quiet || git commit -m "chore: update rsonar trend history [skip ci]"
          git push
