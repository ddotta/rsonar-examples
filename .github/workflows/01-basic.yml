# ============================================================
# Workflow 1 — Basic rsonar check
# Runs a full analysis and generates an HTML report.
# ============================================================
name: "Example: Basic rsonar"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rsonar-basic:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            libxml2-dev libcurl4-openssl-dev libssl-dev libgit2-dev

      - name: Install R dependencies
        run: |
          Rscript -e "
          install.packages(c('remotes','lintr','styler','covr','goodpractice',
                             'cli','jsonlite','glue','fs','rlang','withr'),
                           repos = 'https://cloud.r-project.org')
          remotes::install_github('ddotta/rsonar')
          "

      - name: Run rsonar analysis
        run: |
          Rscript -e "
          library(rsonar)
          res <- sonar_analyse('.', verbose = TRUE)
          print(res)
          sonar_report(res, output = 'rsonar-report.html', open = FALSE)
          "

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rsonar-report
          path: rsonar-report.html
          retention-days: 14
